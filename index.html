<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Golf Ball Finder</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --green-deep: #1a2e1a;
    --fairway: #7ab87a;
    --cream: #f5f0e8;
    --gold: #c9a84c;
    --danger: #c0392b;
  }

  body {
    background: var(--green-deep);
    color: var(--cream);
    font-family: 'DM Mono', monospace;
    height: 100dvh; overflow: hidden;
    display: flex; flex-direction: column;
  }

  header {
    padding: 16px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 100%);
    z-index: 10; flex-shrink: 0;
  }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; letter-spacing: 0.05em; }
  .logo span { color: var(--gold); font-weight: 600; }

  .status-pill {
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 4px 10px; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px; color: rgba(255,255,255,0.6); transition: all 0.3s;
  }
  .status-pill.active  { border-color: var(--fairway); color: var(--fairway); background: rgba(122,184,122,0.1); }
  .status-pill.loading { border-color: var(--gold);    color: var(--gold);    background: rgba(201,168,76,0.1); }
  .status-pill.error   { border-color: var(--danger);  color: #e74c3c; }

  .camera-container { flex: 1; position: relative; overflow: hidden; min-height: 0; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }

  .corner { position: absolute; width: 24px; height: 24px; pointer-events: none; opacity: 0.5; z-index: 5; }
  .corner-tl { top: 12px;    left: 12px;  border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .corner-tr { top: 12px;    right: 12px; border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); }
  .corner-bl { bottom: 12px; left: 12px;  border-bottom: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .corner-br { bottom: 12px; right: 12px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

  #detectionsLayer { position: absolute; inset: 0; z-index: 5; pointer-events: none; }

  /* Each detection is a card floating over the camera */
  .detection-card {
    position: absolute;
    pointer-events: all;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transform: translate(-50%, -50%);
    animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    from { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
    to   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
  }

  .detection-ring {
    border-radius: 50%;
    border: 2.5px solid var(--gold);
    box-shadow: 0 0 0 1px rgba(201,168,76,0.2), 0 0 20px rgba(201,168,76,0.5);
    animation: pulse 1.8s ease-in-out infinite;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 1px rgba(201,168,76,0.2), 0 0 16px rgba(201,168,76,0.5); }
    50%      { box-shadow: 0 0 0 6px rgba(201,168,76,0.1), 0 0 30px rgba(201,168,76,0.7); }
  }

  .detection-label {
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold); white-space: nowrap;
    background: rgba(0,0,0,0.65); padding: 3px 10px; border-radius: 10px;
    border: 1px solid rgba(201,168,76,0.3);
  }

  /* Action buttons — always visible below the ring */
  .detection-actions {
    display: flex;
    gap: 16px;
    align-items: center;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    padding: 8px 16px;
    border-radius: 40px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .btn-confirm, .btn-reject {
    width: 48px; height: 48px; border-radius: 50%;
    border: none; cursor: pointer; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s; box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    flex-shrink: 0;
  }
  .btn-confirm { background: var(--fairway); color: white; }
  .btn-reject  { background: var(--danger);  color: white; }
  .btn-confirm:active, .btn-reject:active { transform: scale(0.85); }

  .btn-label {
    font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(255,255,255,0.4); text-align: center; margin-top: 2px;
    line-height: 1;
  }

  .btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }

  /* Loading overlay */
  .loading-overlay {
    position: absolute; inset: 0;
    background: rgba(10,20,10,0.88);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; z-index: 20;
  }
  .loading-spinner {
    width: 56px; height: 56px;
    border: 3px solid rgba(201,168,76,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.5); text-align: center; line-height: 2.2; }
  .loading-text strong { color: var(--gold); display: block; font-size: 14px; margin-bottom: 4px; }

  /* Bottom bar */
  .bottom-bar {
    padding: 14px 20px; flex-shrink: 0;
    background: linear-gradient(0deg, rgba(0,0,0,0.55) 0%, transparent 100%);
    display: flex; align-items: center; justify-content: space-between;
  }
  .stats { display: flex; gap: 20px; }
  .stat  { text-align: center; }
  .stat-number { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--gold); line-height: 1; }
  .stat-label  { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-top: 2px; }

  .btn-scan {
    width: 68px; height: 68px; border-radius: 50%;
    background: var(--gold); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 4px rgba(201,168,76,0.2), 0 4px 20px rgba(0,0,0,0.4);
    transition: all 0.2s; flex-shrink: 0;
  }
  .btn-scan:active   { transform: scale(0.93); }
  .btn-scan:disabled { opacity: 0.4; cursor: not-allowed; animation: none; }
  .btn-scan.scanning { background: var(--fairway); animation: scanPulse 1.5s ease-in-out infinite; }
  @keyframes scanPulse {
    0%,100% { box-shadow: 0 0 0 4px rgba(122,184,122,0.2), 0 4px 20px rgba(0,0,0,0.4); }
    50%      { box-shadow: 0 0 0 12px rgba(122,184,122,0.12), 0 4px 20px rgba(0,0,0,0.4); }
  }
  .btn-scan svg { width: 30px; height: 30px; }

  /* Start screen */
  .start-screen {
    position: absolute; inset: 0; background: var(--green-deep);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 28px; z-index: 100; padding: 40px;
  }
  .start-icon {
    width: 110px; height: 110px; border-radius: 50%;
    background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.25);
    display: flex; align-items: center; justify-content: center; font-size: 52px;
  }
  .start-title { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 300; text-align: center; line-height: 1.15; }
  .start-title span { color: var(--gold); font-weight: 600; display: block; }
  .start-desc { font-size: 12px; letter-spacing: 0.04em; color: rgba(255,255,255,0.4); text-align: center; line-height: 1.9; max-width: 280px; }
  .btn-start {
    background: var(--gold); color: var(--green-deep); border: none;
    padding: 16px 44px; font-family: 'DM Mono', monospace;
    font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase;
    border-radius: 40px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3); transition: all 0.2s;
  }
  .btn-start:active { transform: scale(0.96); }

  /* Toast */
  .toast {
    position: absolute; top: 70px; left: 50%;
    transform: translateX(-50%) translateY(-16px);
    background: rgba(10,20,10,0.9); backdrop-filter: blur(8px);
    color: var(--cream); padding: 10px 22px; border-radius: 20px;
    font-size: 12px; letter-spacing: 0.05em; opacity: 0; transition: all 0.3s;
    pointer-events: none; white-space: nowrap; z-index: 50;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--fairway); color: var(--fairway); }
  .toast.reject  { border-color: var(--danger);  color: #e74c3c; }
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
  <div class="start-icon">⛳</div>
  <div class="start-title">Golf Ball<span>Finder</span></div>
  <p class="start-desc">
    IA em tempo real para detectar bolas de golfe.<br>
    Confirma ✓ ou rejeita ✕ cada detecção.<br><br>
    <em>O modelo demora ~20s a carregar na 1ª vez.</em>
  </p>
  <button class="btn-start" onclick="startApp()">Iniciar</button>
</div>

<header>
  <div class="logo">Golf<span>Finder</span></div>
  <div class="status-pill" id="statusPill">A carregar...</div>
</header>

<div class="camera-container" id="cameraContainer">
  <video id="video" autoplay playsinline muted></video>

  <div class="loading-overlay" id="loadingOverlay" style="display:none">
    <div class="loading-spinner"></div>
    <div class="loading-text">
      <strong>A carregar IA</strong>
      Primeira vez pode demorar ~20 segundos
    </div>
  </div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div id="detectionsLayer"></div>
</div>

<div class="bottom-bar">
  <div class="stats">
    <div class="stat">
      <div class="stat-number" id="countFound">0</div>
      <div class="stat-label">Confirmadas</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="countRejected">0</div>
      <div class="stat-label">Rejeitadas</div>
    </div>
  </div>

  <button class="btn-scan" id="btnScan" onclick="toggleScan()" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="#1a2e1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
  </button>

  <div class="stats">
    <div class="stat">
      <div class="stat-number" id="countDetected">0</div>
      <div class="stat-label">Detectadas</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="countPending">0</div>
      <div class="stat-label">Pendentes</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const TARGET_CLASSES   = ['sports ball'];
  const MIN_SCORE        = 0.30;
  // Extra filter: bounding box must be roughly square (a ball is round)
  // ratio = shorter side / longer side — must be above this threshold
  const MIN_ASPECT_RATIO = 0.65;
  const SCAN_INTERVAL_MS = 1800;
  const MAX_DETECTIONS   = 2;
  const AUTO_REMOVE_MS   = 12000;

  let video, model;
  let scanning = false, scanTimer = null;
  let detections = [], detectionId = 0, isProcessing = false;
  let stats = { found: 0, rejected: 0, detected: 0 };

  async function startApp() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('loadingOverlay').style.display = 'flex';
    setStatus('A carregar...', 'loading');
    video = document.getElementById('video');

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      await new Promise(r => video.onloadedmetadata = r);
    } catch(e) {
      setStatus('Sem câmara', 'error');
      document.getElementById('loadingOverlay').innerHTML = `
        <div style="font-size:48px">📷</div>
        <div class="loading-text"><strong style="color:#e74c3c">Câmara bloqueada</strong>Abre no Safari e permite o acesso</div>`;
      return;
    }

    try {
      model = await cocoSsd.load({ base: 'mobilenet_v2' });
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('btnScan').disabled = false;
      setStatus('Pronto', 'active');
    } catch(e) {
      setStatus('Erro IA', 'error');
      document.getElementById('loadingOverlay').innerHTML = `
        <div style="font-size:48px">⚠️</div>
        <div class="loading-text"><strong style="color:#e74c3c">Erro ao carregar IA</strong>Verifica a ligação e recarrega</div>`;
    }
  }

  function setStatus(text, type) {
    const p = document.getElementById('statusPill');
    p.textContent = text;
    p.className = 'status-pill ' + (type || '');
  }

  function toggleScan() {
    if (!model) return;
    scanning = !scanning;
    const btn = document.getElementById('btnScan');
    if (scanning) {
      btn.classList.add('scanning');
      setStatus('A detectar...', 'active');
      runDetection();
      scanTimer = setInterval(runDetection, SCAN_INTERVAL_MS);
    } else {
      btn.classList.remove('scanning');
      setStatus('Pausado', '');
      clearInterval(scanTimer);
    }
  }

  async function runDetection() {
    if (!model || !video || video.readyState < 2 || isProcessing) return;
    if (detections.length >= MAX_DETECTIONS) return;
    isProcessing = true;

    try {
      const predictions = await model.detect(video);

      const balls = predictions.filter(p => {
        if (!TARGET_CLASSES.includes(p.class)) return false;
        if (p.score < MIN_SCORE) return false;

        // Circularity filter: bounding box must be roughly square
        const [, , bw, bh] = p.bbox;
        const aspect = Math.min(bw, bh) / Math.max(bw, bh);
        if (aspect < MIN_ASPECT_RATIO) return false;

        return true;
      });

      const container = document.getElementById('cameraContainer');
      const rect   = container.getBoundingClientRect();
      const scaleX = rect.width  / (video.videoWidth  || video.clientWidth);
      const scaleY = rect.height / (video.videoHeight || video.clientHeight);

      balls.forEach(ball => {
        const [bx, by, bw, bh] = ball.bbox;
        const px = (bx + bw / 2) * scaleX;
        const py = (by + bh / 2) * scaleY;
        const r  = (Math.max(bw, bh) / 2) * Math.max(scaleX, scaleY);

        const tooClose = detections.some(d => {
          const dx = d.px - px, dy = d.py - py;
          return Math.sqrt(dx*dx + dy*dy) < 80;
        });

        if (!tooClose && detections.length < MAX_DETECTIONS) {
          addDetection(px, py, r, Math.round(ball.score * 100));
        }
      });
    } catch(e) { console.error(e); }

    isProcessing = false;
  }

  function addDetection(px, py, radius, confidence) {
    const id = ++detectionId;
    // Ring size: based on detected radius but clamped to reasonable bounds
    const ringSize = Math.max(Math.min(radius * 1.6, 110), 50);

    detections.push({ id, px, py });
    stats.detected++;
    updateStats();

    const container = document.getElementById('cameraContainer');
    const rect = container.getBoundingClientRect();

    // Clamp position so card always stays inside camera area
    const margin = ringSize + 70; // account for buttons below
    const clampedPx = Math.max(ringSize, Math.min(px, rect.width  - ringSize));
    const clampedPy = Math.max(ringSize, Math.min(py, rect.height - margin));

    const layer = document.getElementById('detectionsLayer');
    const el = document.createElement('div');
    el.className  = 'detection-card';
    el.id         = `det-${id}`;
    el.style.left = clampedPx + 'px';
    el.style.top  = clampedPy + 'px';

    el.innerHTML = `
      <div class="detection-label">Bola? ${confidence}%</div>
      <div class="detection-ring" style="width:${ringSize*2}px; height:${ringSize*2}px;"></div>
      <div class="detection-actions">
        <div class="btn-wrap">
          <button class="btn-confirm" onclick="confirmDetection(${id})">✓</button>
          <div class="btn-label">É bola</div>
        </div>
        <div class="btn-wrap">
          <button class="btn-reject" onclick="rejectDetection(${id})">✕</button>
          <div class="btn-label">Não é</div>
        </div>
      </div>`;

    layer.appendChild(el);
    updatePending();
    setTimeout(() => removeDetection(id, false), AUTO_REMOVE_MS);
  }

  function confirmDetection(id) {
    stats.found++;
    showToast('⛳ Bola confirmada!', 'success');
    removeDetection(id, true);
    updateStats();
  }

  function rejectDetection(id) {
    stats.rejected++;
    showToast('✕ Não é uma bola', 'reject');
    removeDetection(id, true);
    updateStats();
  }

  function removeDetection(id, animate) {
    const el = document.getElementById(`det-${id}`);
    if (!el) return;
    detections = detections.filter(d => d.id !== id);
    if (animate) {
      el.style.transition = 'transform 0.25s, opacity 0.25s';
      el.style.transform  = 'translate(-50%, -50%) scale(0)';
      el.style.opacity    = '0';
      setTimeout(() => el.remove(), 260);
    } else { el.remove(); }
    updatePending();
  }

  function updateStats() {
    document.getElementById('countFound').textContent    = stats.found;
    document.getElementById('countRejected').textContent = stats.rejected;
    document.getElementById('countDetected').textContent = stats.detected;
  }

  function updatePending() {
    document.getElementById('countPending').textContent = detections.length;
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => { t.className = 'toast'; }, 2500);
  }
</script>
</body>
</html>
