<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GolfFinder v1.4</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --green-deep: #1a2e1a;
    --fairway: #7ab87a;
    --cream: #f5f0e8;
    --gold: #c9a84c;
    --danger: #c0392b;
  }

  body {
    background: var(--green-deep);
    color: var(--cream);
    font-family: 'DM Mono', monospace;
    height: 100dvh; overflow: hidden;
    display: flex; flex-direction: column;
  }

  header {
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 100%);
    z-index: 10; flex-shrink: 0;
  }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; letter-spacing: 0.05em; }
  .logo span { color: var(--gold); font-weight: 600; }

  .status-pill {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 4px 10px; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px; color: rgba(255,255,255,0.6); transition: all 0.3s;
  }
  .status-pill.active  { border-color: var(--fairway); color: var(--fairway); background: rgba(122,184,122,0.1); }
  .status-pill.loading { border-color: var(--gold);    color: var(--gold);    background: rgba(201,168,76,0.1); }

  /* Camera fills remaining space */
  .camera-container { flex: 1; position: relative; overflow: hidden; min-height: 0; }

  #video { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* Overlay canvas — drawn on top of video in real time */
  #overlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 4;
  }

  .corner { position: absolute; width: 24px; height: 24px; pointer-events: none; opacity: 0.4; z-index: 5; }
  .corner-tl { top: 12px;    left: 12px;  border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .corner-tr { top: 12px;    right: 12px; border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); }
  .corner-bl { bottom: 12px; left: 12px;  border-bottom: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .corner-br { bottom: 12px; right: 12px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

  /* Confirm/reject buttons layer */
  #detectionsLayer { position: absolute; inset: 0; z-index: 6; pointer-events: none; }

  .detection-card {
    position: absolute; pointer-events: all;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    transform: translate(-50%, -50%);
    animation: popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    from { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
    to   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
  }

  .detection-actions {
    display: flex; gap: 14px; align-items: center;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
    padding: 8px 14px; border-radius: 40px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-confirm, .btn-reject {
    width: 46px; height: 46px; border-radius: 50%;
    border: none; cursor: pointer; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s; box-shadow: 0 2px 12px rgba(0,0,0,0.4); flex-shrink: 0;
  }
  .btn-confirm { background: var(--fairway); color: white; }
  .btn-reject  { background: var(--danger);  color: white; }
  .btn-confirm:active, .btn-reject:active { transform: scale(0.85); }
  .btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .btn-label { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4); }

  /* Loading overlay */
  .loading-overlay {
    position: absolute; inset: 0; background: rgba(10,20,10,0.92);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; z-index: 20;
  }
  .loading-spinner {
    width: 56px; height: 56px;
    border: 3px solid rgba(201,168,76,0.2); border-top-color: var(--gold);
    border-radius: 50%; animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.5); text-align: center; line-height: 2.2; }
  .loading-text strong { color: var(--gold); display: block; font-size: 14px; margin-bottom: 4px; }

  /* Bottom bar */
  .bottom-bar {
    padding: 14px 20px; flex-shrink: 0;
    background: linear-gradient(0deg, rgba(0,0,0,0.55) 0%, transparent 100%);
    display: flex; align-items: center; justify-content: space-between;
  }
  .stats { display: flex; gap: 20px; }
  .stat  { text-align: center; }
  .stat-number { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: var(--gold); line-height: 1; }
  .stat-label  { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-top: 2px; }

  .btn-scan {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--gold); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 4px rgba(201,168,76,0.2), 0 4px 20px rgba(0,0,0,0.4);
    transition: all 0.2s; flex-shrink: 0;
  }
  .btn-scan:active   { transform: scale(0.93); }
  .btn-scan:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-scan.scanning { background: var(--fairway); animation: scanPulse 1.5s ease-in-out infinite; }
  @keyframes scanPulse {
    0%,100% { box-shadow: 0 0 0 4px rgba(122,184,122,0.2), 0 4px 20px rgba(0,0,0,0.4); }
    50%      { box-shadow: 0 0 0 12px rgba(122,184,122,0.12), 0 4px 20px rgba(0,0,0,0.4); }
  }
  .btn-scan svg { width: 28px; height: 28px; }

  /* Start screen */
  .start-screen {
    position: absolute; inset: 0; background: var(--green-deep);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 28px; z-index: 100; padding: 40px;
  }
  .start-icon {
    width: 100px; height: 100px; border-radius: 50%;
    background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.25);
    display: flex; align-items: center; justify-content: center; font-size: 48px;
  }
  .start-title { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; text-align: center; line-height: 1.15; }
  .start-title span { color: var(--gold); font-weight: 600; display: block; }
  .start-desc { font-size: 12px; color: rgba(255,255,255,0.4); text-align: center; line-height: 1.9; max-width: 280px; }
  .btn-start {
    background: var(--gold); color: var(--green-deep); border: none; padding: 16px 44px;
    font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.15em;
    text-transform: uppercase; border-radius: 40px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3); transition: all 0.2s;
  }

  .toast {
    position: absolute; bottom: 110px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: rgba(10,20,10,0.9); backdrop-filter: blur(8px);
    color: var(--cream); padding: 10px 22px; border-radius: 20px;
    font-size: 12px; opacity: 0; transition: all 0.3s;
    pointer-events: none; white-space: nowrap; z-index: 50;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--fairway); color: var(--fairway); }
  .toast.reject  { border-color: var(--danger);  color: #e74c3c; }
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
  <div class="start-icon">⛳</div>
  <div class="start-title">Golf Ball<span>Finder</span></div>
  <p class="start-desc">
    v1.4 — Deteção em tempo real<br>
    IA corre diretamente no telemóvel.<br><br>
    <em>Demora ~20s a carregar na 1ª vez.</em>
  </p>
  <button class="btn-start" onclick="startApp()">Iniciar</button>
</div>

<header>
  <div class="logo">Golf<span>Finder</span></div>
  <div class="status-pill loading" id="statusPill">v1.4</div>
</header>

<div class="camera-container" id="cameraContainer">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>

  <div class="loading-overlay" id="loadingOverlay" style="display:none">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">
      <strong>A carregar IA</strong>
      Aguarda ~20 segundos
    </div>
  </div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div id="detectionsLayer"></div>
</div>

<div class="bottom-bar">
  <div class="stats">
    <div class="stat">
      <div class="stat-number" id="countFound">0</div>
      <div class="stat-label">Confirmadas</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="countRejected">0</div>
      <div class="stat-label">Rejeitadas</div>
    </div>
  </div>

  <button class="btn-scan" id="btnScan" onclick="toggleScan()" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="#1a2e1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
  </button>

  <div class="stats">
    <div class="stat">
      <div class="stat-number" id="countDetected">0</div>
      <div class="stat-label">Detectadas</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="countPending">0</div>
      <div class="stat-label">Pendentes</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── CONFIG ────────────────────────────────────────────────
  const MIN_SCORE      = 0.25;   // confiança mínima COCO
  const MIN_ASPECT     = 0.60;   // bounding box deve ser ~quadrada (bola = redonda)
  const MAX_AREA_FRAC  = 0.08;   // bola não pode ocupar mais de 8% do frame
  const MIN_AREA_FRAC  = 0.0003; // nem menos de 0.03% (demasiado pequena)
  const FRAME_INTERVAL = 200;    // ms entre cada análise de frame (~5fps de deteção)
  const CONFIRM_FRAMES = 2;      // bola tem de aparecer em X frames seguidos para ser assinalada
  const DISAPPEAR_MS   = 1500;   // após quantos ms sem deteção remove a marcação
  const AUTO_REMOVE_MS = 20000;  // botões desaparecem após 20s sem resposta

  let video, overlay, ctx, model;
  let scanning    = false;
  let animFrame   = null;
  let lastRun     = 0;
  let candidates  = {}; // tracks detections across frames: id → {px,py,r,frames,lastSeen}
  let confirmed   = {}; // detections shown to user waiting for ✓/✕
  let detectionId = 0;
  let stats = { found: 0, rejected: 0, detected: 0 };

  // ── STARTUP ───────────────────────────────────────────────
  async function startApp() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('loadingOverlay').style.display = 'flex';

    video   = document.getElementById('video');
    overlay = document.getElementById('overlay');
    ctx     = overlay.getContext('2d');

    // Camera
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      await new Promise(r => video.onloadedmetadata = r);
      resizeOverlay();
      setStatus('A carregar IA...', 'loading');
    } catch(e) {
      setLoading('Câmara bloqueada', 'Abre no Safari e permite o acesso');
      return;
    }

    // Load model
    try {
      model = await cocoSsd.load({ base: 'mobilenet_v2' });
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('btnScan').disabled = false;
      setStatus('Pronto', 'active');
    } catch(e) {
      setLoading('Erro ao carregar IA', 'Verifica a ligação e recarrega');
    }
  }

  function resizeOverlay() {
    const c = document.getElementById('cameraContainer');
    overlay.width  = c.clientWidth;
    overlay.height = c.clientHeight;
  }

  window.addEventListener('resize', resizeOverlay);

  // ── SCAN LOOP ─────────────────────────────────────────────
  function toggleScan() {
    scanning = !scanning;
    const btn = document.getElementById('btnScan');
    if (scanning) {
      btn.classList.add('scanning');
      setStatus('A detectar...', 'active');
      loop();
    } else {
      btn.classList.remove('scanning');
      setStatus('Pausado', '');
      if (animFrame) cancelAnimationFrame(animFrame);
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      clearAllDetections();
    }
  }

  function loop() {
    if (!scanning) return;
    animFrame = requestAnimationFrame(async (ts) => {
      if (ts - lastRun >= FRAME_INTERVAL) {
        lastRun = ts;
        await detect();
      }
      loop();
    });
  }

  // ── DETECTION ─────────────────────────────────────────────
  async function detect() {
    if (!model || !video || video.readyState < 2) return;

    let preds;
    try {
      preds = await model.detect(video);
    } catch(e) { return; }

    const vw = video.videoWidth  || overlay.width;
    const vh = video.videoHeight || overlay.height;
    const sx = overlay.width  / vw;
    const sy = overlay.height / vh;
    const frameArea = vw * vh;

    // Filter: only sports balls with right shape and size
    const balls = preds.filter(p => {
      if (p.class !== 'sports ball') return false;
      if (p.score  < MIN_SCORE)      return false;
      const [,, bw, bh] = p.bbox;
      const aspect = Math.min(bw, bh) / Math.max(bw, bh);
      if (aspect < MIN_ASPECT) return false;
      const areaFrac = (bw * bh) / frameArea;
      if (areaFrac < MIN_AREA_FRAC || areaFrac > MAX_AREA_FRAC) return false;
      return true;
    });

    const now = Date.now();

    // Match detections to existing candidates
    const matched = new Set();
    balls.forEach(b => {
      const [bx, by, bw, bh] = b.bbox;
      const px = (bx + bw / 2) * sx;
      const py = (by + bh / 2) * sy;
      const r  = Math.max(bw, bh) / 2 * Math.max(sx, sy);

      // Find nearest existing candidate
      let best = null, bestDist = 80;
      Object.keys(candidates).forEach(id => {
        const c = candidates[id];
        const d = Math.hypot(c.px - px, c.py - py);
        if (d < bestDist) { bestDist = d; best = id; }
      });

      if (best) {
        // Update existing
        candidates[best].px = px;
        candidates[best].py = py;
        candidates[best].r  = r;
        candidates[best].frames++;
        candidates[best].lastSeen = now;
        matched.add(best);
      } else {
        // New candidate
        const id = 'c' + (++detectionId);
        candidates[id] = { px, py, r, frames: 1, lastSeen: now };
        matched.add(id);
      }
    });

    // Remove candidates not seen recently
    Object.keys(candidates).forEach(id => {
      if (now - candidates[id].lastSeen > DISAPPEAR_MS) {
        delete candidates[id];
      }
    });

    // Promote stable candidates to confirmed detections
    Object.keys(candidates).forEach(id => {
      const c = candidates[id];
      if (c.frames >= CONFIRM_FRAMES && !confirmed[id]) {
        confirmed[id] = true;
        showDetection(id, c.px, c.py, c.r);
      }
    });

    // Draw overlay
    drawOverlay();
  }

  // ── DRAW ──────────────────────────────────────────────────
  function drawOverlay() {
    ctx.clearRect(0, 0, overlay.width, overlay.height);

    Object.keys(candidates).forEach(id => {
      const c = candidates[id];
      if (confirmed[id]) return; // already shown as card

      // Draw pulsing circle for unconfirmed candidates
      const alpha = Math.min(c.frames / CONFIRM_FRAMES, 1);
      ctx.beginPath();
      ctx.arc(c.px, c.py, c.r * 1.3, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(201, 168, 76, ${alpha * 0.8})`;
      ctx.lineWidth   = 2;
      ctx.stroke();

      // Label
      ctx.fillStyle = `rgba(201, 168, 76, ${alpha})`;
      ctx.font      = '11px DM Mono, monospace';
      ctx.textAlign = 'center';
      ctx.fillText('⛳ A verificar...', c.px, c.py - c.r * 1.3 - 8);
    });
  }

  // ── SOUND ─────────────────────────────────────────────────
  function playDetectionSound() {
    try {
      const ac = new (window.AudioContext || window.webkitAudioContext)();
      [[880, 0], [1100, 0.15]].forEach(([freq, delay]) => {
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.type = "sine";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, ac.currentTime + delay);
        gain.gain.linearRampToValueAtTime(0.35, ac.currentTime + delay + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + 0.45);
        osc.start(ac.currentTime + delay);
        osc.stop(ac.currentTime + delay + 0.5);
      });
    } catch(e) {}
  }

  // ── SHOW DETECTION CARD ───────────────────────────────────
  function showDetection(cid, px, py, radius) {
    const id = 'det-' + cid;
    if (document.getElementById(id)) return;

    const r = Math.max(Math.min(radius * 1.8, 100), 36);
    stats.detected++;
    updateStats();
    playDetectionSound();

    const container = document.getElementById('cameraContainer');
    const rect = container.getBoundingClientRect();
    const cpx = Math.max(r, Math.min(px, rect.width  - r));
    const cpy = Math.max(r + 10, Math.min(py, rect.height - r - 80));

    const layer = document.getElementById('detectionsLayer');
    const el = document.createElement('div');
    el.className = 'detection-card';
    el.id = id;
    el.style.left = cpx + 'px';
    el.style.top  = cpy + 'px';

    el.innerHTML = `
      <div class="detection-actions">
        <div class="btn-wrap">
          <button class="btn-confirm" onclick="confirmDet('${cid}')">✓</button>
          <div class="btn-label">É bola</div>
        </div>
        <div class="btn-wrap">
          <button class="btn-reject" onclick="rejectDet('${cid}')">✕</button>
          <div class="btn-label">Não é</div>
        </div>
      </div>`;

    layer.appendChild(el);
    updatePending();

    // Auto-remove if not answered
    setTimeout(() => removeDet(cid, false), AUTO_REMOVE_MS);
  }

  function confirmDet(cid) {
    stats.found++;
    showToast('⛳ Bola confirmada!', 'success');
    removeDet(cid, true);
    updateStats();
  }

  function rejectDet(cid) {
    stats.rejected++;
    showToast('✕ Não é uma bola', 'reject');
    removeDet(cid, true);
    updateStats();
  }

  function removeDet(cid, animate) {
    delete confirmed[cid];
    delete candidates[cid];
    const el = document.getElementById('det-' + cid);
    if (!el) return;
    if (animate) {
      el.style.transition = 'transform 0.2s, opacity 0.2s';
      el.style.transform = 'translate(-50%, -50%) scale(0)';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 220);
    } else { el.remove(); }
    updatePending();
  }

  function clearAllDetections() {
    candidates = {};
    confirmed  = {};
    document.getElementById('detectionsLayer').innerHTML = '';
    updatePending();
  }

  // ── UI HELPERS ────────────────────────────────────────────
  function setStatus(text, type) {
    const p = document.getElementById('statusPill');
    p.textContent = text;
    p.className = 'status-pill ' + (type || '');
  }

  function setLoading(title, sub) {
    document.getElementById('loadingText').innerHTML = `<strong>${title}</strong>${sub}`;
  }

  function updateStats() {
    document.getElementById('countFound').textContent    = stats.found;
    document.getElementById('countRejected').textContent = stats.rejected;
    document.getElementById('countDetected').textContent = stats.detected;
  }

  function updatePending() {
    document.getElementById('countPending').textContent = Object.keys(confirmed).length;
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => { t.className = 'toast'; }, 2500);
  }
</script>
</body>
</html>
